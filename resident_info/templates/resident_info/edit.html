{% extends "core/frames/frame_node.html" %}

{% set show_nav = true %}
{% set show_header = false %}

{% block admin_title %}
  {% if resident %}编辑{% else %}新建{% endif %}居民信息
{% endblock %}

{% block admin_content %}
<form method="post" class="row g-3">
    {{ csrf_token }}
    
    <div class="col-md-6">
        <label class="form-label">姓名 *</label>
        <input type="text" name="name" class="form-control" value="{{ resident.name if resident and resident.name else '' }}" required>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">与户主关系</label>
        <select name="relation" class="form-select">
            <option value="">请选择</option>
            {% for item in relations %}
            <option value="{{ item.id }}" {% if resident and resident.relation_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">身份证号</label>
        <input type="text" name="id_card" id="id_card" class="form-control" 
               value="{{ resident.id_card if resident and resident.id_card else '' }}"
               maxlength="18"
               placeholder="15位或18位身份证号"
               oninput="handleIdCardInput(this)"
               onpaste="setTimeout(() => handleIdCardInput(this), 0)">
        <div id="id_card_feedback" class="form-text"></div>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">性别</label>
        <select name="gender" id="gender" class="form-select">
            <option value="">请选择</option>
            {% for item in genders %}
            <option value="{{ item.id }}" data-name="{{ item.name }}" {% if resident and resident.gender_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">出生日期</label>
        <input type="date" name="birth_date" class="form-control" value="{{ resident.birth_date if resident and resident.birth_date else '' }}">
    </div>
    
    <div class="col-md-6">
        <label class="form-label">联系电话</label>
        <input type="text" name="phone" class="form-control" value="{{ resident.phone if resident and resident.phone else '' }}">
    </div>
    
    <div class="col-md-6">
        <label class="form-label">现住小区/建筑</label>
        <input type="text" name="current_community" class="form-control" value="{{ resident.current_community if resident and resident.current_community else '' }}">
    </div>
    
    <div class="col-md-6">
        <label class="form-label">门牌地址</label>
        <input type="text" name="current_door" class="form-control" value="{{ resident.current_door if resident and resident.current_door else '' }}">
    </div>
    
    <div class="col-md-6">
        <label class="form-label">所属网格</label>
        <select name="grid" class="form-select">
            <option value="">请选择</option>
            {% for item in grids %}
            <option value="{{ item.id }}" {% if resident and resident.grid_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">人员类型</label>
        <select name="resident_type" class="form-select">
            <option value="">请选择</option>
            {% for item in resident_types %}
            <option value="{{ item.id }}" {% if resident and resident.resident_type_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <div class="form-check mt-4">
            <input type="checkbox" name="is_key_person" class="form-check-input" id="is_key_person" {% if resident and resident.is_key_person %}checked{% endif %}>
            <label class="form-check-label" for="is_key_person">是否重点人员</label>
        </div>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">重点类别</label>
        <select name="key_category" class="form-select">
            <option value="">请选择</option>
            {% for item in key_categories %}
            <option value="{{ item.id }}" {% if resident and resident.key_category_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-12">
        <hr>
        <h6>户籍信息</h6>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">户籍小区/建筑</label>
        <input type="text" name="registered_community" class="form-control" value="{{ resident.registered_community if resident and resident.registered_community else '' }}">
    </div>
    
    <div class="col-md-6">
        <label class="form-label">户籍地址</label>
        <input type="text" name="registered_address" class="form-control" value="{{ resident.registered_address if resident and resident.registered_address else '' }}">
    </div>
    
    <div class="col-md-12">
        <hr>
        <h6>其他信息</h6>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">民族</label>
        <select name="nation" class="form-select">
            <option value="">请选择</option>
            {% for item in nations %}
            <option value="{{ item.id }}" {% if resident and resident.nation_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">政治面貌</label>
        <select name="political_status" class="form-select">
            <option value="">请选择</option>
            {% for item in political_statuses %}
            <option value="{{ item.id }}" {% if resident and resident.political_status_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">婚姻状况</label>
        <select name="marital_status" class="form-select">
            <option value="">请选择</option>
            {% for item in marital_statuses %}
            <option value="{{ item.id }}" {% if resident and resident.marital_status_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">文化程度</label>
        <select name="education" class="form-select">
            <option value="">请选择</option>
            {% for item in educations %}
            <option value="{{ item.id }}" {% if resident and resident.education_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-6">
        <label class="form-label">健康状况</label>
        <select name="health_status" class="form-select">
            <option value="">请选择</option>
            {% for item in health_statuses %}
            <option value="{{ item.id }}" {% if resident and resident.health_status_id == item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="col-md-12">
        <label class="form-label">备注</label>
        <textarea name="notes" class="form-control" rows="3">{{ resident.notes if resident and resident.notes else '' }}</textarea>
    </div>
    
    <div class="col-md-12">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> 保存
        </button>
        <a href="{{ url('modules:resident_info:list') }}" class="btn btn-secondary">取消</a>
    </div>
</form>

<script>
(function() {
    const idCardInput = document.getElementById('id_card');
    const genderSelect = document.getElementById('gender');
    const birthDateInput = document.querySelector('input[name="birth_date"]');
    const feedback = document.getElementById('id_card_feedback');

    function validateIdCard(idCard) {
        idCard = idCard.trim().toUpperCase();
        
        if (!idCard) {
            return { valid: null, message: '' };
        }
        
        if (!/^\d+$/.test(idCard) && !/^\d+X$/i.test(idCard)) {
            return { valid: false, message: '身份证号只能包含数字和字母X' };
        }
        
        if (idCard.length !== 15 && idCard.length !== 18) {
            return { valid: false, message: '身份证号长度必须为15位或18位' };
        }
        
        if (idCard.length === 18) {
            const coefficients = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
            const checkCodes = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];
            
            if (!/^\d+X$/i.test(idCard) && !/^\d{18}$/.test(idCard)) {
                return { valid: false, message: '18位身份证号格式不正确' };
            }
            
            const total = idCard.split('').slice(0, 17).reduce((sum, digit, i) => {
                return sum + parseInt(digit) * coefficients[i];
            }, 0);
            
            const expectedCheckCode = checkCodes[total % 11];
            const actualCheckCode = idCard.slice(-1).toUpperCase();
            
            if (expectedCheckCode !== actualCheckCode) {
                return { valid: false, message: '身份证号校验码不正确' };
            }
        }
        
        return { valid: true, message: '' };
    }

    function parseIdCard(idCard) {
        idCard = idCard.trim();
        
        let birthDateStr;
        if (idCard.length === 15) {
            birthDateStr = '19' + idCard.slice(6, 12);
        } else if (idCard.length === 18) {
            birthDateStr = idCard.slice(6, 14);
        } else {
            return null;
        }
        
        const year = birthDateStr.slice(0, 4);
        const month = birthDateStr.slice(4, 6);
        const day = birthDateStr.slice(6, 8);
        
        if (!/^\d{4}$/.test(year) || !/^\d{2}$/.test(month) || !/^\d{2}$/.test(day)) {
            return null;
        }
        
        const dateStr = `${year}-${month}-${day}`;
        const date = new Date(dateStr);
        
        if (isNaN(date.getTime())) {
            return null;
        }
        
        return dateStr;
    }

    function handleIdCardInput(input) {
        const value = input.value;
        const result = validateIdCard(value);
        
        if (result.valid === null) {
            feedback.textContent = '';
            input.classList.remove('is-valid', 'is-invalid');
        } else if (result.valid) {
            feedback.textContent = '✓ 身份证号格式正确';
            feedback.className = 'form-text text-success';
            input.classList.remove('is-invalid');
            input.classList.add('is-valid');
            
            const birthDate = parseIdCard(value);
            if (birthDate && !birthDateInput.value) {
                birthDateInput.value = birthDate;
            }
            
            const genderDigit = value.length === 15 ? value.slice(-1) : value.slice(16, 17);
            if (/^\d$/.test(genderDigit)) {
                const expectedGender = parseInt(genderDigit) % 2 === 1 ? '男' : '女';
                const options = genderSelect.querySelectorAll('option[data-name]');
                for (const opt of options) {
                    if (opt.dataset.name === expectedGender && !genderSelect.dataset.userSelected) {
                        genderSelect.value = opt.value;
                        break;
                    }
                }
            }
        } else {
            feedback.textContent = '✗ ' + result.message;
            feedback.className = 'form-text text-danger';
            input.classList.remove('is-valid');
            input.classList.add('is-invalid');
        }
    }

    genderSelect.addEventListener('change', function() {
        if (this.value) {
            this.dataset.userSelected = 'true';
        }
    });
})();
</script>
{% endblock %}
